services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: agendamento_app
    volumes:
      - .:/var/www
      - ./custom.ini:/usr/local/etc/php/conf.d/custom.ini
    working_dir: /var/www
    networks:
      - agendamento_net

  nginx:
    image: nginx:latest
    container_name: agendamento_nginx
    ports:
      - "8082:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - agendamento_net

  mysql:
    image: mysql:8.0
    container_name: agendamento_mysql
    environment:
      MYSQL_DATABASE: agendamento
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: agendamento
      MYSQL_PASSWORD: secret
    ports:
      - "3308:3306"
    volumes:
      - agendamento_mysql_data:/var/lib/mysql
    networks:
      - agendamento_net

  redis:
    image: redis:7-alpine
    container_name: agendamento_redis
    # ports:
    #   - "6379:6379" # opcional
    volumes:
      - agendamento_redis_data:/data
    command: redis-server --appendonly yes
    networks:
      - agendamento_net

  worker:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: agendamento_worker
    volumes:
      - .:/var/www
      - ./custom.ini:/usr/local/etc/php/conf.d/custom.ini
    working_dir: /var/www
    command:
      - php
      - artisan
      - queue:work
      - redis
      - --sleep=3
      - --tries=3
      - --max-time=3600
      - --timeout=90
    restart: unless-stopped
    depends_on:
      - redis
      - mysql
    networks:
      - agendamento_net

networks:
  agendamento_net:
    driver: bridge

volumes:
  agendamento_mysql_data:
  agendamento_redis_data: