version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: agendamento_app
    volumes:
      - .:/var/www
    working_dir: /var/www
    networks:
      - agendamento_net

  nginx:
    image: nginx:alpine
    container_name: agendamento_nginx
    ports:
      - "8081:80"   # 👈 porta diferente
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - agendamento_net

  mysql:
    image: mysql:8.0
    container_name: agendamento_mysql
    environment:
      MYSQL_DATABASE: agendamento
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: agendamento
      MYSQL_PASSWORD: secret
    ports:
      - "3308:3306" # 👈 porta diferente
    volumes:
      - agendamento_mysql_data:/var/lib/mysql
    networks:
      - agendamento_net

networks:
  agendamento_net:
    driver: bridge

volumes:
  agendamento_mysql_data:
